servers:
  - url: https://virtserver.swaggerhub.com/joeworkman/TotalCMS/3.0.0
    description: SwaggerHub API Auto Mocking
  - url: http://localhost:8000/
    description: ''
tags:
  - name: schemas
  - name: collections
  - name: objects
  - name: imageworks
  - name: download
  - name: froala
  - name: import
openapi: 3.0.3
info:
  contact:
    name: Joe Workman
    email: support@weaversspace.com
  title: Total CMS
  description: REST API for Total CMS
  version: 3.0.0
paths:
  /schemas/{schema}:
    get:
      parameters:
        - schema:
            type: string
          in: path
          name: schema
          required: true
          description: The ID of the schema
      tags:
        - schemas
      responses:
        '200':
          description: The schema for a collection
      description: |
        This gets a schema. This could return a predefined schema from within the CMS or a custom schema that is stored in the .schema.json file inside of the collection.
      security: []
      summary: Get Schema
  /schemas:
    post:
      security: []
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                index:
                  type: string
                  items:
                    type: string
                  example:
                    - featured
                    - hidden
                    - external
                    - free
                    - sale
                    - popular
                    - new
                    - id
                    - name
                    - color
                    - subtitle
                    - version
                    - price
                    - developer
                    - tags
                    - icon
                    - popularity
                    - cartloom
                    - releaseDate
                    - updateDate
                properties:
                  type: object
                  properties:
                    video:
                      type: object
                      properties:
                        type:
                          type: string
                          example: string
                        default:
                          type: string
                          example: default value
                        fieldset:
                          type: string
                          example: video
                title:
                  type: string
                  example: My Object
                type:
                  type: string
                  example: object
                description:
                  type: string
                  example: My cool object description
                required:
                  type: string
                  items:
                    type: string
                  example:
                    - id
                    - name
                    - subtitle
                    - version
                    - price
                    - developer
                    - tags
                    - cartloom
        required: true
        description: |
          Save a new schema to a collection. You cannot save a schema for any built-in collection.
      summary: Save Schema
      responses:
        '200':
          description: ''
      description: |
        Save a new schema. You cannot save a schema for any built-in collection.
      tags:
        - schemas
  /collections:
    get:
      parameters: []
      tags:
        - collections
      responses:
        '200':
          description: A list of collections
      description: |-
        This request lists out all of the possible collections in the CMS.

        A collection must have a .meta.json file in order to be considered to be a collection.
        The .meta.json file contains ciritcal data about a collection such as its schema type.
      summary: Get Collections
    post:
      tags:
        - collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/collection'
        required: true
        description: |
          This creates a new collection. This will create the .meta.json file that contains the schema for a collection as well as the name and associated URL.
      summary: New Collection
      responses:
        '200':
          description: ''
      description: |
        This creates a new collection. This will create the .meta.json file that contains the schema for a collection as well as the name and associated URL.
      security: []
      parameters: []
  /import/csv/{collection}:
    post:
      tags:
        - import
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Import CSV data as objects into the collection
      summary: Import CSV
      responses:
        '200':
          description: ''
      description: Import CSV data as objects into the collection
      security: []
      parameters:
        - schema:
            type: string
          in: path
          name: collection
          required: true
          description: The ID of the collection
  /collections/{collection}/{id}:
    delete:
      tags:
        - objects
      summary: Delete Object
      responses:
        '200':
          description: ''
      description: Delete an object from a collection.
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: The ID of the object
    get:
      tags:
        - objects
      summary: Get Object
      responses:
        '200':
          description: ''
      description: Get an object from a collection with a specific ID.
      security: []
      parameters:
        - schema:
            type: string
          in: path
          name: collection
          required: true
          description: The ID of the collection
        - required: true
          in: path
          description: The ID of the object
          schema:
            type: string
          name: id
    put:
      tags:
        - objects
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Update a portion of the object's properties with new values
      summary: Update Object
      responses:
        '200':
          description: ''
      description: Update a portion of the object's properties with new values
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: The ID of the object
    head:
      tags:
        - objects
      summary: Exists Object
      responses:
        '200':
          description: ''
      description: Test to see if an object exists
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: The ID of the object
  /collections/{collection}/schema:
    get:
      tags:
        - collections
        - schemas
      summary: Get Collection Schema
      responses:
        '200':
          description: ''
      description: Get the collections schema
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
  /collections/{collection}:
    get:
      tags:
        - collections
      summary: Get Collection Index
      responses:
        '200':
          description: ''
      description: Get the collections index with the summary of all objects within it.
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
    put:
      tags:
        - collections
      summary: Update Collection Index
      responses:
        '200':
          description: ''
      description: This will delete the existing index and create a new index from scratch based on all of the objects within the collection.
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
    post:
      tags:
        - collections
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/object'
        required: true
        description: |
          Save an object to a collection
      summary: New Object in Collection
      responses:
        '200':
          description: ''
      description: |
        Save an object to a collection
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
  /imageworks/{collection}/{id}/{property}/{file}:
    get:
      tags:
        - imageworks
      summary: Get Image
      responses:
        '200':
          description: ''
      description: Get an image. You can pass many get parameters to the API in order to apply filters and constraints to the image.
      security: []
      parameters:
        - schema:
            type: string
          in: path
          name: collection
          required: true
          description: The ID of the collection
        - required: true
          in: path
          description: The ID of the object
          schema:
            type: string
          name: id
        - schema:
            type: string
          in: path
          name: property
          required: true
          description: The property name of the object
        - required: true
          in: path
          description: The file name that is apart of the property
          schema:
            type: string
          name: file
    delete:
      parameters:
        - schema:
            type: string
          in: path
          name: collection
          required: true
          description: The ID of the collection
        - required: true
          in: path
          description: The ID of the object
          schema:
            type: string
          name: id
        - schema:
            type: string
          in: path
          name: property
          required: true
          description: The property name of the object
        - required: true
          in: path
          description: The file name that is apart of the property
          schema:
            type: string
          name: file
      security: []
      tags:
        - imageworks
      responses:
        '200':
          description: ''
      description: Clear the image cache related to an image. This will cause all new imageworks API calls for this image to generate new versions on the next request.
      summary: Clear Image Cache
  /import/url/{collection}:
    post:
      tags:
        - import
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Open Graph and meta data can be detected on a URL and imported into a collection as an object.
      summary: Import URL
      responses:
        '200':
          description: ''
      description: Open Graph and meta data can be detected on a URL and imported into a collection as an object.
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
  /download/{collection}/{id}/{property}/{file}:
    get:
      tags:
        - download
      summary: Get File
      responses:
        '200':
          description: ''
      description: Download a file.
      security: []
      parameters:
        - schema:
            type: string
          in: path
          name: collection
          required: true
          description: The ID of the collection
        - required: true
          in: path
          description: The ID of the object
          schema:
            type: string
          name: id
        - schema:
            type: string
          in: path
          name: property
          required: true
          description: The property name of the object
        - required: true
          in: path
          description: The file name that is apart of the property
          schema:
            type: string
          name: file
  /collections/{collection}/{id}/{property}:
    put:
      tags:
        - objects
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Reorder an object's array property. This can be useful when reordering galleries, depots or sets.
      summary: Reorder Property
      responses:
        '200':
          description: ''
      description: Reorder an object's array property. This can be useful when reordering galleries, depots or sets.
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: The ID of the object
        - required: true
          in: path
          description: The property name of the object
          schema:
            type: string
          name: property
    post:
      tags:
        - objects
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Upload a new file to a gallery or depot into a object property.
      summary: New Property File
      responses:
        '200':
          description: ''
      description: Upload a new file to a gallery or depot into a object property.
      security: []
      parameters:
        - schema:
            type: string
          in: path
          name: collection
          required: true
          description: The ID of the collection
        - required: true
          in: path
          description: The ID of the object
          schema:
            type: string
          name: id
        - schema:
            type: string
          in: path
          name: property
          required: true
          description: The property name of the object
  /import/rss/{collection}:
    post:
      tags:
        - import
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Import RSS data as objects into the collection
      summary: Import RSS
      responses:
        '200':
          description: ''
      description: Import RSS data as objects into the collection
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
  /froala/depot/{id}:
    post:
      tags:
        - froala
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Upload a file or video into the Froala editor. The response needs to be a specific output for the froala editor. All files should be saved to a depot collection. This API is a basic wrapper around the native collections API for a depot collection.
      summary: Upload File or Video
      responses:
        '200':
          description: ''
      description: Upload a file or video into the Froala editor. The response needs to be a specific output for the froala editor. All files should be saved to a depot collection. This API is a basic wrapper around the native collections API for a depot collection.
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the object
          schema:
            type: string
          name: id
  /froala/gallery/{id}:
    post:
      tags:
        - froala
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Upload a image into the Froala editor. The response needs to be a specific output for the froala editor. All images should be saved to a gallery collection. This API is a basic wrapper around the native collections API for a gallery collection.
      summary: Upload Image
      responses:
        '200':
          description: ''
      description: Upload a image into the Froala editor. The response needs to be a specific output for the froala editor. All images should be saved to a gallery collection. This API is a basic wrapper around the native collections API for a gallery collection.
      security: []
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: The ID of the object
    get:
      tags:
        - froala
      summary: Get Images
      responses:
        '200':
          description: ''
      description: Get all of the images from the froala gallery. The retuned data needs to be specfic for froala. This API is a wrapper for the native API to get all images from a gallery collection.
      security: []
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: The ID of the object
    delete:
      tags:
        - froala
      summary: Delete Image
      responses:
        '200':
          description: ''
      description: Delete an image from the froala gallery. The retuned data needs to be specfic for froala. This API is a wrapper for the native API to delete an image from a gallery collection. The name of the image to be deleted will be passed via the POST data.
      security: []
      parameters:
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: The ID of the object
  /collections/{collection}/{id}/{property}/{file}:
    delete:
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
        - schema:
            type: string
          in: path
          name: id
          required: true
          description: The ID of the object
        - required: true
          in: path
          description: The property name of the object
          schema:
            type: string
          name: property
        - schema:
            type: string
          in: path
          name: file
          required: true
          description: The file name that is apart of the property
      security: []
      tags:
        - objects
      responses:
        '200':
          description: ''
      description: Delete a file that is a part of a property.
      summary: Delete File
    put:
      tags:
        - objects
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Delete a file that is a part of a property.
      summary: Update File Meta
      responses:
        '200':
          description: ''
      description: Update meta data related to a file that is a part of a property.
      security: []
      parameters:
        - schema:
            type: string
          in: path
          name: collection
          required: true
          description: The ID of the collection
        - required: true
          in: path
          description: The ID of the object
          schema:
            type: string
          name: id
        - schema:
            type: string
          in: path
          name: property
          required: true
          description: The property name of the object
        - required: true
          in: path
          description: The file name that is apart of the property
          schema:
            type: string
          name: file
  /import/wordpress/{collection}:
    post:
      tags:
        - import
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Import a Wordpress blog export into a collection
      summary: Import Wordpress
      responses:
        '200':
          description: ''
      description: Import a Wordpress blog export into a collection
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
  /import/yaml/{collection}:
    post:
      tags:
        - import
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Import YAML data as objects into the collection
      summary: Import YAML
      responses:
        '200':
          description: ''
      description: Import YAML data as objects into the collection
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
  /import/json/{collection}:
    post:
      tags:
        - import
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Import JSON data as objects into the collection
      summary: Import JSON
      responses:
        '200':
          description: ''
      description: Import JSON data as objects into the collection
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
  /import/factory/{collection}:
    post:
      tags:
        - import
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                id:
                  type: string
                  example: mytext
                content:
                  type: string
                  example: This is my content
                wordcount:
                  type: string
                  example: '4'
        required: true
        description: Use Faker data in order to generate fake objects in a collection. Fake data could possibly be based on the schema or data passed to this request.
      summary: Import Factory
      responses:
        '200':
          description: ''
      description: Use Faker data in order to generate fake objects in a collection. Fake data could possibly be based on the schema or data passed to this request.
      security: []
      parameters:
        - required: true
          in: path
          description: The ID of the collection
          schema:
            type: string
          name: collection
components:
  schemas:
    object:
      type: object
      properties:
        id:
          type: string
          example: sample-text-object
        content:
          type: string
          example: This is my content
    collection:
      type: object
      properties:
        name:
          type: string
          example: myblog
        schema:
          type: string
          example: blog
        url:
          type: string
          example: 'https://example.com/blog/'