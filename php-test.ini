; Inherit from system php.ini and add extensions for testing
extension=/opt/homebrew/lib/php/pecl/20250925/apcu.so
extension=/opt/homebrew/lib/php/pecl/20250925/pcov.so
;extension=/opt/homebrew/lib/php/pecl/20250925/redis.so
;extension=/opt/homebrew/lib/php/pecl/20250925/memcached.so

[APCu]
apc.enable_cli = 1

[pcov]
pcov.enabled = 1
pcov.directory = .

[Redis]
; Redis extension is enabled by loading the extension

[Memcached]
; Memcached extension is enabled by loading the extension